<link rel="stylesheet" href="style.css" />

<section class="chat-tab">
    <section class="chat-tab-main">
        <div class="chat-tab-head">
            <h1>{{chatTitle}}</h1>
            <button @click="$router.push('/')">← Back to Chats</button>
        </div>
        <div class="divider"></div>

        <!-- <section class="member-list">
            <h3>Members</h3>
            <ul>
                <li v-for="actor in members" :key="actor">
                    <graffiti-actor-to-handle :actor="actor" />
                </li>
            </ul>
        </section> -->

        <section class="invite-section">
            <button
                v-if="!showInviteForm"
                @click="showInviteForm = true; inviteSuccess = false"
            >
                Invite Someone
            </button>
            <form v-if="showInviteForm" @submit.prevent="sendInvite">
                <label>Person to invite: </label>
                <input
                    type="text"
                    v-model="inviteeActor"
                    placeholder="handle.graffiti.actor"
                />
                <button
                    type="submit"
                    :disabled="!inviteeActor.trim() || isInviting"
                >
                    {{ isInviting ? "Sending..." : "Send Invite" }}
                </button>
                <button @click="cancelInvite">Cancel</button>
                <p v-if="inviteError">{{ inviteError }}</p>
                <p v-if="inviteSuccess">Invitation sent!</p>
            </form>
        </section>
        <div class="divider"></div>

        <section class="chat-tab-messages">
            <p v-if="messagesLoading">Loading messages...</p>
            <chat-message
                v-else-if="sortedMessages.length > 0"
                v-for="msg in sortedMessages"
                :key="msg.url"
                :msg="msg"
                @delete="deleteMessage"
            />
            <p v-else>No messages yet. Say something!</p>
        </section>

        <form @submit.prevent="sendMessage" class="chat-send-bar">
            <input
                type="text"
                v-model="myMessage"
                placeholder="Type a message..."
            />
            <button
                type="submit"
                :disabled="!myMessage.trim() || isSendingMessage"
            >
                {{ isSendingMessage ? "Sending..." : "Send" }}
            </button>
        </form>
    </section>
</section>
