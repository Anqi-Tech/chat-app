<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Group Project Chat</title>
        <script type="importmap">
            {
                "imports": {
                    "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
                    "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
                    "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
                }
            }
        </script>
        <script src="index.js" type="module"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="app">Loading...</div>

        <template id="template">
            <h1>Group Project Chat</h1>

            <div v-if="!$graffitiSession.value">
                <p>Please log in to continue.</p>
                <button @click="$graffiti.login()">Log In</button>
            </div>

            <template v-else>
                <button @click="$graffiti.logout($graffitiSession.value)">
                    Log Out
                </button>

                <div v-if="!currentChat">
                    <!-- Page Upon Logging In -->
                    <!-- Shows all chats user is in and can create new ones -->
                    <h2>My Chats</h2>

                    <form @submit.prevent="createChat">
                        <input
                            type="text"
                            v-model="newChatTitle"
                            placeholder="New chat name..."
                        />
                        <button
                            type="submit"
                            :disabled="!newChatTitle.trim() || isCreatingChat"
                        >
                            {{ isCreatingChat ? "Creating..." : "Create Chat" }}
                        </button>
                    </form>

                    <p v-if="sortedChats.length === 0">
                        No chats yet. Create one above!
                    </p>
                    <ul v-else>
                        <li v-for="chat in sortedChats" :key="chat.url">
                            <button @click="openChat(chat)">
                                {{ chat.value.title }}
                            </button>
                        </li>
                    </ul>
                </div>

                <!-- In specific chat: all messages and tasks -->
                <div v-else>
                    <button @click="goBackToChats">← Back to Chats</button>
                    <h2>{{ currentChat.value.title }}</h2>

                    <section>
                        <h3>Tasks</h3>
                        <button @click="showTaskForm = !showTaskForm">
                            {{ showTaskForm ? "Cancel" : "New Task" }}
                        </button>

                        <form v-if="showTaskForm" @submit.prevent="createTask">
                            <div>
                                <label>Title: </label>
                                <input
                                    type="text"
                                    v-model="newTask.title"
                                    placeholder="Task title"
                                    required
                                />
                            </div>
                            <div>
                                <label>Deadline: </label>
                                <input
                                    type="date"
                                    v-model="newTask.deadline"
                                    required
                                />
                            </div>
                            <div>
                                <!-- TODO: make this a dropdown of all users at a later date -->
                                <label>Assignees (separated by commas): </label>
                                <input
                                    type="text"
                                    v-model="newTask.assignees"
                                    placeholder="Alice, Bob, etc."
                                />
                            </div>
                            <div>
                                <label>Description (optional): </label>
                                <textarea
                                    v-model="newTask.description"
                                    placeholder="What needs to be done?"
                                ></textarea>
                            </div>
                            <button
                                type="submit"
                                :disabled="!newTask.title.trim() || !newTask.deadline || isCreatingTask"
                            >
                                {{ createTaskLabel }}
                            </button>
                        </form>

                        <p v-if="tasksLoading">Loading tasks...</p>
                        <p v-else-if="sortedTasks.length === 0">
                            No tasks yet.
                        </p>
                        <section v-else class="task-container">
                            <article
                                v-for="task in sortedTasks"
                                :key="task.url"
                                class="task-card"
                            >
                                <h4>{{ task.value.title }}</h4>
                                <p>Due: {{ task.value.deadline }}</p>
                                <p>
                                    Assignees: {{
                                    joinAssignees(task.value.assignees) }}
                                </p>

                                <div class="task-status">
                                    <p>Status:</p>
                                    <select
                                        v-if="task.actor === $graffitiSession.value?.actor"
                                        :value="task.value.status"
                                        @change="updateTaskStatus(task, $event.target.value)"
                                    >
                                        <option>Not Started</option>
                                        <option>In Progress</option>
                                        <option>Completed</option>
                                    </select>
                                    <p v-else>{{ task.value.status }}</p>
                                </div>

                                <p>
                                    Description: {{ task.value.description ||
                                    "No additional description" }}
                                </p>
                            </article>
                        </section>
                    </section>

                    <section>
                        <h3>Messages</h3>
                        <p v-if="messagesLoading">Loading messages...</p>
                        <ul v-else-if="sortedMessages.length > 0">
                            <li v-for="msg in sortedMessages" :key="msg.url">
                                <strong>
                                    <graffiti-actor-to-handle
                                        :actor="msg.actor"
                                    /> </strong
                                >: {{ msg.value.content }}
                                <button
                                    v-if="msg.actor === $graffitiSession.value?.actor"
                                    @click="deleteMessage(msg)"
                                >
                                    Delete
                                </button>
                            </li>
                        </ul>
                        <p v-else>No messages yet. Say something!</p>

                        <form @submit.prevent="sendMessage">
                            <input
                                type="text"
                                v-model="myMessage"
                                placeholder="Type a message..."
                            />
                            <button
                                type="submit"
                                :disabled="!myMessage.trim() || isSendingMessage"
                            >
                                {{ isSendingMessage ? "Sending..." : "Send" }}
                            </button>
                        </form>
                    </section>
                </div>
            </template>
        </template>
    </body>
</html>
